<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefing | Voices At Work</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;600;800&display=swap');

        :root {
            --brand-red: #e11d48;
            --brand-dark: #0f172a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: var(--brand-dark);
            min-height: 100vh;
        }

        /* Desktop specific height lock - Released on Mobile */
        @media (min-width: 1024px) {
            body {
                overflow: hidden; 
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
        }
        
        .heading-font { font-family: 'Unbounded', sans-serif; }

        @keyframes ticker-slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-move {
            display: flex;
            width: max-content;
            animation: ticker-slide 30s linear infinite;
        }

        .custom-scroll::-webkit-scrollbar { width: 2px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; }

        /* Compact Article Typography */
        .article-body p { margin-bottom: 1rem; line-height: 1.6; color: #334155; font-size: 0.95rem; }
        .article-body h2 { font-family: 'Unbounded', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--brand-dark); margin-top: 1.5rem; margin-bottom: 0.75rem; letter-spacing: -0.05em; }
        .article-body img { border-radius: 0.75rem; margin: 1.5rem 0; width: 100%; height: auto; }
    </style>
</head>
<body class="antialiased">

    <!-- Compact Navbar -->
    <nav class="h-12 border-b border-slate-100 flex-shrink-0 px-4 flex justify-between items-center bg-white sticky top-0 z-50">
        <div class="flex items-center gap-4 md:gap-6">
            <a href="index.html" class="heading-font font-black text-[10px] tracking-tighter uppercase italic">
                VOICES <span class="text-rose-600">AT WORK</span>
            </a>
            <div class="hidden md:flex gap-4 text-[9px] font-black uppercase tracking-widest text-slate-400">
                <a href="index.html" class="text-rose-600">HOME</a>
                <a href="inspiration.html" class="hover:text-slate-900 transition">Inspiration</a>
                <a href="services.html" class="hover:text-slate-900 transition">Services</a>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-pulse"></div>
            <span class="hidden xs:block text-[8px] font-black uppercase tracking-widest text-slate-400">File Access: Active</span>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="flex flex-col lg:flex-row flex-1 lg:overflow-hidden">
        
        <!-- Main Article Column -->
        <main class="w-full lg:w-3/5 p-5 lg:p-8 lg:border-r border-slate-100 lg:overflow-y-auto custom-scroll bg-white">
            <article class="max-w-xl mx-auto">
                <header class="mb-6">
                    <div id="post-meta" class="text-[8px] font-black uppercase text-rose-600 mb-2 tracking-[0.2em]">
                        <!-- Injected via JS -->
                    </div>
                    <h1 id="post-title" class="text-xl md:text-2xl lg:text-3xl heading-font font-black leading-tight tracking-tighter mb-4">
                        <!-- Injected via JS -->
                    </h1>
                    <div id="post-featured-image" class="aspect-[21/9] rounded-xl overflow-hidden bg-slate-100 mb-6 shadow-sm">
                        <!-- Injected via JS -->
                    </div>
                </header>

                <div id="post-content" class="article-body">
                    <!-- Loading State -->
                    <div class="py-10 text-center">
                        <div class="inline-block animate-spin rounded-full h-4 w-4 border-t-2 border-rose-600"></div>
                    </div>
                </div>

                <footer class="mt-12 pt-6 border-t border-slate-100 mb-8 lg:mb-0">
                    <div class="bg-slate-900 p-6 rounded-xl text-white flex flex-col sm:flex-row justify-between items-center gap-4 text-center sm:text-left">
                        <div>
                            <h3 class="heading-font text-xs font-black tracking-tighter uppercase">VOICES INTELLIGENCE</h3>
                            <p class="text-[9px] text-slate-400 font-medium">Curated professional briefing.</p>
                        </div>
                        <a href="support.html" class="w-full sm:w-auto px-6 py-2 bg-rose-600 text-white rounded text-[8px] font-black uppercase tracking-widest hover:bg-rose-700 transition text-center">Support Our Work</a>
                    </div>
                </footer>
            </article>
        </main>

        <!-- Sidebar -->
        <aside class="w-full lg:w-2/5 bg-slate-50/30 flex flex-col lg:overflow-hidden border-t lg:border-t-0 border-slate-100">
            
            <!-- Metadata Section -->
            <div class="p-5 border-b border-slate-200">
                <h3 class="text-[9px] font-black uppercase text-slate-400 mb-3 tracking-widest italic">Metadata</h3>
                <div class="grid grid-cols-2 lg:block lg:space-y-2 gap-4">
                    <div class="flex justify-between items-end border-b border-slate-100 pb-1">
                        <span class="text-[8px] font-bold text-slate-400 uppercase">Analyst</span>
                        <span id="side-author" class="text-[9px] font-black text-slate-900 uppercase tracking-tighter">---</span>
                    </div>
                    <div class="flex justify-between items-end border-b border-slate-100 pb-1">
                        <span class="text-[8px] font-bold text-slate-400 uppercase">Read Time</span>
                        <span id="side-read-time" class="text-[9px] font-black text-slate-900 uppercase tracking-tighter">---</span>
                    </div>
                </div>
            </div>

            <!-- Related Section -->
            <div class="flex-1 p-5 lg:overflow-y-auto custom-scroll">
                <h3 class="text-[9px] font-black uppercase text-slate-400 mb-4 tracking-widest italic">Related Briefings</h3>
                <div id="sidebar-target" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4 lg:space-y-4">
                    <!-- Data via JS -->
                </div>
            </div>

            <!-- Ad Placement -->
            <div class="p-4 border-t border-slate-200 bg-white sticky bottom-0 lg:relative">
                <div class="h-[60px] lg:h-[90px] w-full flex flex-col items-center justify-center border border-dashed border-slate-200 rounded">
                    <span class="text-[7px] font-black text-slate-300 uppercase tracking-widest">Advertisement Space</span>
                </div>
            </div>
        </aside>
    </div>

    <!-- Ticker -->
    <div class="h-8 bg-black border-t border-rose-600 flex items-center overflow-hidden flex-shrink-0">
        <div class="ticker-move">
            <div id="ticker-content" class="flex items-center"></div>
            <div id="ticker-content-clone" class="flex items-center"></div>
        </div>
    </div>

    <script>
        async function displayPost() {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (!slug) { window.location.href = 'index.html'; return; }

            try {
                const response = await fetch('assets/data/stories.json?v=' + Date.now());
                const stories = await response.json();
                const story = stories.find(s => s.slug === slug);

                if (story) {
                    document.title = `${story.title} | Briefing`;
                    document.getElementById('post-title').innerText = story.title;
                    document.getElementById('post-meta').innerText = `${story.category} / ${story.date}`;
                    document.getElementById('post-featured-image').innerHTML = `<img src="${story.featured_image}" class="w-full h-full object-cover" alt="Featured">`;
                    document.getElementById('post-content').innerHTML = story.content;
                    document.getElementById('side-author').innerText = story.author;
                    document.getElementById('side-read-time').innerText = story.reading_time || '4 MIN';
                    populateExtras(stories, slug);
                }
            } catch (e) { console.error(e); }
        }

        function populateExtras(stories, currentSlug) {
            const sidebarTarget = document.getElementById('sidebar-target');
            const ticker = document.getElementById('ticker-content');
            const tickerClone = document.getElementById('ticker-content-clone');

            sidebarTarget.innerHTML = ''; // Clear loading state

            stories.filter(s => s.slug !== currentSlug).slice(0, 6).forEach(story => {
                sidebarTarget.innerHTML += `
                    <div class="group border-b border-slate-100 lg:border-0 pb-2 lg:pb-0">
                        <p class="text-[7px] font-black text-rose-600 uppercase mb-1 tracking-tighter">${story.category}</p>
                        <h4 class="text-[10px] font-bold leading-tight group-hover:text-rose-600 transition">
                            <a href="post.html?slug=${story.slug}">${story.title}</a>
                        </h4>
                    </div>
                `;
            });

            stories.forEach(story => {
                const tickerItem = `<div class="flex items-center gap-3 px-4 border-r border-slate-800 h-8"><span class="text-white text-[8px] font-black uppercase tracking-tighter whitespace-nowrap">${story.title}</span></div>`;
                ticker.innerHTML += tickerItem; tickerClone.innerHTML += tickerItem;
            });
        }
        window.onload = displayPost;
    </script>
</body>
</html>
