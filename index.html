<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voices At Work | Intelligence Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;600;800&display=swap');

        :root {
            --brand-red: #e11d48;
            --brand-dark: #0f172a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
            color: var(--brand-dark);
        }
        
        /* Desktop specific height lock - Released on Mobile */
        @media (min-width: 1024px) {
            body {
                overflow: hidden; 
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
        }
        
        .heading-font { font-family: 'Unbounded', sans-serif; }

        @keyframes ticker-slide {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-move {
            display: flex;
            width: max-content;
            animation: ticker-slide 30s linear infinite;
        }
        .ticker-move:hover { animation-play-state: paused; }

        .custom-scroll::-webkit-scrollbar { width: 3px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>

    <!-- SEO Meta Tags -->
<title>Voices At Work | High-Performance Development & Architecture</title>
<meta name="description" content="Voices At Work specializes in lightweight, high-concurrency system architecture using Laravel, Python, and FrankenPHP.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://voices-at-work.github.io/voices-at-work/">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://voices-at-work.github.io/voices-at-work/">
<meta property="og:title" content="Voices At Work | High-Performance Architecture">
<meta property="og:description" content="Direct, lightweight, and bloat-free system solutions.">
<meta property="og:image" content="https://voices-at-work.github.io/voices-at-work/assets/img/og-preview.jpg">
</head>
<body class="antialiased">

    <!-- Navbar -->
    <nav class="h-14 border-b border-slate-100 flex-shrink-0 px-4 md:px-6 flex justify-between items-center bg-white sticky top-0 z-50">
        <div class="flex items-center gap-4 md:gap-8">
            <a href="index.html" class="heading-font font-black text-xs tracking-tighter uppercase italic">
                VOICES <span class="text-rose-600">AT WORK</span>
            </a>
            <div class="hidden md:flex gap-6 text-[10px] font-bold uppercase tracking-widest text-slate-400">
                <a href="inspiration.html" class="hover:text-rose-600 transition">Inspiration</a>
                <a href="services.html" class="hover:text-rose-600 transition">Our Services</a>
                <a href="support.html" class="hover:text-rose-600 transition">Support Our Work</a>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-emerald-500"></div>
                <span class="text-[8px] font-black uppercase tracking-widest text-slate-400">Online</span>
            </div>
            <!-- Mobile Menu Toggle -->
            <button class="md:hidden text-slate-400" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </div>
    </nav>

    <!-- Mobile Nav Dropdown -->
    <div id="mobile-menu" class="hidden md:hidden bg-slate-900 p-4 space-y-4 text-center">
        <a href="inspiration.html" class="block text-[10px] font-bold uppercase tracking-widest text-white">Inspiration</a>
        <a href="services.html" class="block text-[10px] font-bold uppercase tracking-widest text-white">Our Services</a>
        <a href="support.html" class="block text-[10px] font-bold uppercase tracking-widest text-white">Support Our Work</a>
    </div>

    <!-- Main Content Area -->
    <div class="flex flex-col lg:flex-row flex-1 lg:overflow-hidden">
        
        <!-- Far Left: Main Story -->
        <main class="w-full lg:w-3/5 p-6 lg:p-8 lg:border-r border-slate-100 lg:overflow-y-auto custom-scroll">
            <h3 class="text-[9px] font-black uppercase text-rose-600 mb-4 tracking-widest">Lead Dispatch</h3>
            <div id="main-story-target">
                <!-- Data via JS -->
            </div>
        </main>

        <!-- Far Right: Sidebar -->
        <aside class="w-full lg:w-2/5 bg-slate-50/50 flex flex-col lg:overflow-hidden lg:border-l border-slate-100 border-t lg:border-t-0">
            
            <!-- Fixed Search Bar -->
            <div class="p-6 border-b border-slate-200 bg-slate-50/80 backdrop-blur-sm">
                <div class="relative">
                    <input type="text" placeholder="SEARCH ARCHIVES..." class="w-full bg-white lg:bg-transparent border border-slate-300 rounded-md py-2 px-3 text-[10px] font-bold tracking-widest focus:outline-none focus:border-rose-600 transition uppercase">
                    <div class="absolute right-3 top-2.5">
                        <svg class="w-3 h-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>
            </div>

            <!-- Scrollable Briefing List -->
            <div class="flex-1 p-6 lg:p-8 lg:overflow-y-auto custom-scroll">
                <h3 class="text-[9px] font-black uppercase text-slate-400 mb-4 tracking-widest">Previous Briefings</h3>
                <div id="sidebar-target" class="space-y-6">
                    <!-- Data via JS -->
                </div>
            </div>

            <!-- Fluid Ad Space -->
            <div class="p-4 border-t border-slate-200 bg-white/50">
                <h3 class="text-[7px] font-black uppercase text-slate-300 mb-1 tracking-[0.2em] italic text-center lg:text-left">Advertisement</h3>
                <div class="min-h-[60px] lg:min-h-[90px] w-full flex items-center justify-center">
                    <span class="text-[8px] text-slate-300 font-black uppercase tracking-widest border border-dashed border-slate-200 px-4 py-2 w-full text-center">Fluid Ad Component</span>
                </div>
            </div>
        </aside>
    </div>

    <!-- Ticker -->
    <div class="h-10 lg:h-12 bg-black border-t border-rose-600 flex items-center overflow-hidden flex-shrink-0 sticky lg:relative bottom-0">
        <div class="ticker-move">
            <div id="ticker-content" class="flex items-center"></div>
            <div id="ticker-content-clone" class="flex items-center"></div>
        </div>
    </div>

    <!-- Footer (Hidden on tiny mobiles to save space, or just stacked) -->
    <footer class="py-4 lg:h-8 bg-white border-t border-slate-100 flex flex-col lg:flex-row items-center justify-between px-6 flex-shrink-0 gap-2">
        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest text-center">
            © <span id="current-year"></span> VOICES AT WORK — By THE CONTINENT VENTURES
        </p>
        <div class="flex gap-4 text-[8px] font-bold text-slate-400 uppercase tracking-widest">
            <span class="text-slate-300 italic">The Continent Ventures Systems</span>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        async function initPortal() {
            const mainTarget = document.getElementById('main-story-target');
            const sidebarTarget = document.getElementById('sidebar-target');
            const ticker = document.getElementById('ticker-content');
            const tickerClone = document.getElementById('ticker-content-clone');

            try {
                const response = await fetch('assets/data/stories.json?t=' + Date.now());
                const stories = (await response.json()).reverse();

                mainTarget.innerHTML = '';
                sidebarTarget.innerHTML = '';
                ticker.innerHTML = '';
                tickerClone.innerHTML = '';

                stories.forEach((story, index) => {
                    if (index === 0) {
                        mainTarget.innerHTML = `
                            <article class="group">
                                <div class="overflow-hidden rounded-lg mb-6 aspect-video bg-slate-100 shadow-sm">
                                    <img src="${story.featured_image}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700" alt="${story.title}">
                                </div>
                                <h2 class="text-xl lg:text-2xl heading-font font-black leading-tight mb-4 tracking-tighter">
                                    <a href="post.html?slug=${story.slug}" class="hover:text-rose-600 transition">${story.title}</a>
                                </h2>
                                <p class="text-xs text-slate-500 leading-relaxed mb-6">${story.content.replace(/<[^>]*>?/gm, '').substring(0, 300)}...</p>
                                <a href="post.html?slug=${story.slug}" class="text-[9px] font-black uppercase tracking-widest border-b border-black pb-0.5 hover:text-rose-600 hover:border-rose-600 transition">Read Full Dispatch</a>
                            </article>
                        `;
                    }
                    else if (index > 0) {
                        sidebarTarget.innerHTML += `
                            <div class="flex gap-4 group cursor-pointer border-b border-slate-200/60 pb-4 last:border-0">
                                <div class="w-16 h-16 flex-shrink-0 rounded bg-slate-200 overflow-hidden">
                                    <img src="${story.featured_image}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition duration-500" alt="${story.title}">
                                </div>
                                <div>
                                    <h4 class="text-xs font-bold leading-snug group-hover:text-rose-600 transition">
                                        <a href="post.html?slug=${story.slug}">${story.title}</a>
                                    </h4>
                                    <p class="text-[8px] font-black text-slate-300 uppercase mt-1">${story.date}</p>
                                </div>
                            </div>
                        `;
                    }

                    const tickerItem = `
                        <div class="flex items-center gap-3 px-6 border-r border-slate-800 h-10 lg:h-12">
                            <div class="w-5 h-5 rounded-full bg-slate-700 overflow-hidden flex-shrink-0">
                                <img src="${story.featured_image}" class="w-full h-full object-cover">
                            </div>
                            <span class="text-white text-[9px] font-black uppercase tracking-tighter whitespace-nowrap">${story.title}</span>
                        </div>
                    `;
                    ticker.innerHTML += tickerItem;
                    tickerClone.innerHTML += tickerItem;
                });

            } catch (error) {
                console.error("Portal Initialization Error:", error);
            }
        }

        window.onload = initPortal;
    </script>
</body>
</html>
